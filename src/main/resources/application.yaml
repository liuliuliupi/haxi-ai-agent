spring:
  application:
    name: haxi-ai-agent
  profiles:
    active: local
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      embedding:
        options:
          model: text-embedding-v1
  # 禁用数据源自动配置 (PostgreSQL 已停用)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
#  datasource:
#    url: jdbc:postgresql://rm-cn-htd4opu890001rho.rwlb.rds.aliyuncs.com/he_ai_agent
#    username: my_user
#    password: Liu040612
#  vectorstore:
#    pgvector:
#      index-type: HNSW
#      distance-type: COSINE_DISTANCE
#      dimensions: 1536
#      max-document-batch-size: 10000 # Optional: Maximum number of documents per batch
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi接口文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.haxi.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
  resources:
    enabled: true
# 修改日志级别，查看 Spring AI 更多调用细节
logging:
  level:
    org.springframework.ai: DEBUG